---
# Redis Deployment for caching and task queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: real-mfa-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-mfa-secrets
                  key: REDIS_PASSWORD
          command:
            - sh
            - -c
            - "redis-server --appendonly yes --requirepass $REDIS_PASSWORD"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}  # For production, use PersistentVolumeClaim
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: real-mfa-prod
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
