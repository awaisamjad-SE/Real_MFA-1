---
# Secret - Sensitive data (base64 encoded)
# WARNING: This is a template. Replace values with base64-encoded secrets before applying.
# To encode a value: echo -n "your-value" | base64
# Example: echo -n "your-db-password" | base64
apiVersion: v1
kind: Secret
metadata:
  name: real-mfa-secrets
  namespace: real-mfa-prod
type: Opaque
data:
  SECRET_KEY: "<BASE64_SECRET_KEY>"
  DB_PASSWORD: "<BASE64_DB_PASSWORD>"
  BREVO_API_KEY: "<BASE64_BREVO_API_KEY>"
  REDIS_PASSWORD: "<BASE64_REDIS_PASSWORD>"
---
# ImagePullSecret - For private Docker Hub (if needed)
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: real-mfa-prod
type: kubernetes.io/dockercfg
data:
  .dockercfg: "<BASE64_DOCKERCFG_JSON>"  # Generate from: kubectl create secret docker-registry ... --dry-run=client -o yaml
