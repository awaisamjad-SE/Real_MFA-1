name: CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user -d ci_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: Real_MFA
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Real_MFA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        env:
          ENVIRONMENT: production
          DEBUG: "False"
          SECRET_KEY: ci-prod-secret-key-very-long-and-random-2026-safe-value
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: ci_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CELERY_TASK_ALWAYS_EAGER: "True"
          CSRF_TRUSTED_ORIGINS: https://example.com
          CORS_ALLOWED_ORIGINS: https://example.com
        run: |
          python manage.py check
          python manage.py check --deploy --fail-level WARNING

      - name: Run migrations
        env:
          ENVIRONMENT: development
          DEBUG: "False"
          SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: db.sqlite3
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          ENVIRONMENT: development
          DEBUG: "False"
          SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: db.sqlite3
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: python manage.py test --verbosity=2
